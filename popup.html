<!DOCTYPE html>
<html>
<head>
  <title>TIGI HR Resume Filler</title>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .header {
      font-size: 18px;
      font-weight: bold;
      color: #291550;
      border-bottom: 2px solid #291550;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }
    input[type="text"], input[type="file"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    button {
      padding: 10px;
      background: #402179;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover {
      background: #291550;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      font-size: 12px;
      color: #666;
      font-style: italic;
      margin-top: 10px;
    }
    .footer {
      font-size: 11px;
      text-align: center;
      color: #888;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">TIGI HR Auto-Filler</div>
    
    <div class="section">
      <label for="apiKey">Gemini API Key:</label>
      <input type="text" id="apiKey" placeholder="Paste your API key here..." />
    </div>

    <div class="section">
      <label for="modelName">Gemini Model:</label>
      <input type="text" id="modelName" value="gemini-3.1-flash-lite-preview" placeholder="gemini-1.5-flash-8b" />
    </div>

    <div class="section" style="flex-direction: row; align-items: center; gap: 8px;">
      <input type="checkbox" id="relevantExpOnly" />
      <label for="relevantExpOnly" style="margin: 0; cursor: pointer; line-height: 1.3;">Calculate Relevant Experience Only<br><small style="font-weight: normal; font-size: 11px; color: #666;">(Based on primary designation vs. total career)</small></label>
    </div>

    <div class="section">
      <label for="resumeFile">Select CV (PDF/Image):</label>
      <input type="file" id="resumeFile" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" />
    </div>

    <button id="processBtn">Extract & Fill Form</button>

    <div id="status">Ready</div>

    <div class="footer">
      Saves settings to local storage automatically.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
